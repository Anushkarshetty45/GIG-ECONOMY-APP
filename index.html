<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers -->
    <!-- Content Security Policy: Prevents XSS attacks -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com;
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: https: blob:;
                   font-src 'self' data:;
                   connect-src 'self' https://*.supabase.co https://api.stripe.com https://production.plaid.com https://sandbox.plaid.com https://cdn.jsdelivr.net https://unpkg.com;
                   worker-src 'self' blob:;
                   child-src 'self' blob:;
                   frame-src 'self' https://js.stripe.com;
                   frame-ancestors 'none';
                   form-action 'self';
                   object-src 'none';
                   base-uri 'self';
                   upgrade-insecure-requests;">

    <!-- Prevent MIME-sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- Prevent clickjacking (redundant with CSP frame-ancestors but provides fallback) -->
    <meta http-equiv="X-Frame-Options" content="DENY">

    <!-- XSS Protection (legacy, but still useful for older browsers) -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">

    <!-- Referrer Policy: Control information sent to other sites -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Permissions Policy: Disable unnecessary browser features -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()">

    <!-- Prevent DNS prefetching for privacy -->
    <meta http-equiv="x-dns-prefetch-control" content="off">

    <title>GIG ECONOMY - Financial Control For Gig Workers</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
